{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Voting App{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="app-shell">
  <header class="app-header py-3">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
      <a href="/" class="navbar-brand text-white fw-bold">Voting App</a>
      <nav class="nav nav-masthead justify-content-center">
        <a class="nav-link text-white" href="/">Home</a>
        <a class="nav-link text-white" href="/vote/">Vote</a>
        <a class="nav-link text-white" href="/results/">Results</a>
        <a class="nav-link text-white" href="/login/">Login</a>
      </nav>
      <div class="text-end text-white small" id="authStatus">Welcome, guest</div>
    </div>
  </header>

  <main class="app-main">{% block content %}{% endblock %}</main>

  <footer class="app-footer text-center text-white py-4">
    <div class="container">
      <p class="mb-1">Secure, attractive voting for every community.</p>
      <small>Created by Digital Group Company Ltd. .</small>
    </div>
  </footer>
  <script src="{% static 'app.js?v=force-vote-20260624' %}?v=multi-final-3"></script>
  {% block page_js %}{% endblock %}
</body>
</html>
