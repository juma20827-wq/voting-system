{% extends "jagwa/base.html" %}
{% load static %}

{% block nav %}
<a href="/">Home</a>
<a href="/vote/">Vote</a>
<a href="/my-vote/">MyVote</a>
<a href="#" id="voterNavLogout">Logout</a>
{% endblock %}

{% block content %}
<style>
  .result-page-wrap {
    max-width: 1180px;
    margin: 32px auto;
    padding: 0 18px 90px;
  }

  .result-header-card {
    max-width: 900px;
    margin: 0 auto 28px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 26px;
    padding: 24px;
    color: white;
    text-align: center;
    box-shadow: 0 16px 35px rgba(0,0,0,0.22);
  }

  .result-header-card h2 {
    margin: 0 0 8px;
    font-size: 32px;
    font-weight: 950;
    letter-spacing: 1px;
  }

  .result-header-card p {
    margin: 6px 0;
    color: #d1d5db;
    font-weight: 800;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 460px));
    justify-content: center;
    gap: 30px;
  }

  .result-card {
    width: 100%;
    max-width: 460px;
    background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035));
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 28px;
    overflow: hidden;
    color: white;
    box-shadow: 0 16px 35px rgba(0,0,0,0.22);
  }

  .result-image-box {
    position: relative;
    width: 100%;
    height: 330px;
    overflow: hidden;
    background: #04070d;
  }

  .result-bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(18px) brightness(.55) saturate(1.25);
    transform: scale(1.15);
  }

  .result-main-img {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
  }

  .result-body {
    padding: 22px;
  }

  .result-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ef233c, #ff7a18);
    color: white;
    padding: 9px 18px;
    border-radius: 999px;
    font-weight: 950;
    margin-bottom: 14px;
  }

  .result-body h3 {
    margin: 0 0 10px;
    font-size: 25px;
    font-weight: 950;
    letter-spacing: .5px;
  }

  .result-position {
    color: #d1d5db;
    margin-bottom: 16px;
    font-size: 18px;
    font-weight: 850;
  }

  .comment-line {
    border-radius: 16px;
    padding: 13px 15px;
    margin: 11px 0;
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    line-height: 1.45;
  }

  .comment-line.national {
    background: linear-gradient(135deg, rgba(239,35,60,.22), rgba(255,255,255,.07));
  }

  .comment-line.club {
    background: linear-gradient(135deg, rgba(22,163,74,.22), rgba(255,255,255,.07));
  }

  .comment-label {
    display: block;
    color: #ff4057;
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .comment-value {
    display: block;
    color: #fff;
    font-size: 18px;
    font-weight: 950;
  }

  .voted-status {
    margin-top: 16px;
    width: 100%;
    border-radius: 18px;
    padding: 16px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
    font-size: 17px;
    font-weight: 950;
    text-align: center;
    box-shadow: 0 12px 24px rgba(22,163,74,.25);
  }

  .back-btn {
    display: inline-block;
    margin-top: 14px;
    background: linear-gradient(135deg, #ef233c, #ff7a18);
    color: white;
    padding: 13px 18px;
    border-radius: 15px;
    font-weight: 950;
    text-decoration: none;
  }

  .result-alert {
    max-width: 900px;
    margin: 0 auto;
    border-radius: 18px;
    padding: 16px;
    background: rgba(239,35,60,0.12);
    border: 1px solid rgba(239,35,60,0.25);
    color: white;
    font-weight: 850;
    text-align: center;
  }

  @media (max-width: 650px) {
    .result-page-wrap {
      margin-top: 18px;
      padding: 0 12px 90px;
    }

    .result-grid {
      grid-template-columns: 1fr;
      gap: 26px;
    }

    .result-card {
      max-width: 100%;
      border-radius: 26px;
    }

    .result-image-box {
      height: 310px;
    }

    .result-header-card h2 {
      font-size: 26px;
    }
  }
</style>

<div class="result-page-wrap">
  <section class="result-header-card">
    <h2>Result</h2>
    <p>Hapa utaona nominees wote uliowapigia kura.</p>
    <a href="/vote/" class="back-btn">Back to Vote</a>
  </section>

  <div id="resultBox">Loading...</div>
</div>

<script>
(function () {
  const API = "/api/";

  function safe(x) {
    return String(x || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getVoter() {
    try { return JSON.parse(localStorage.getItem("voterProfile") || "null"); }
    catch { return null; }
  }

  function updateLoginToLogout() {
    const voter = getVoter();

    document.querySelectorAll("a").forEach(a => {
      const t = (a.textContent || "").trim().toLowerCase();

      if (t === "login") {
        if (voter && voter.token) {
          a.textContent = "Logout";
          a.href = "#";
          a.onclick = function (e) {
            e.preventDefault();
            localStorage.removeItem("voterProfile");
            localStorage.removeItem("votedCandidates");
            window.location.href = "/login/";
          };
        }
      }
    });
  }

  async function api(url, options) {
    const res = await fetch(url, options || {});
    const text = await res.text();
    let data = null;

    try { data = text ? JSON.parse(text) : null; } catch { data = text; }

    if (!res.ok) {
      throw new Error((data && (data.detail || data.message)) || text || "Request failed");
    }

    return data;
  }

  function cleanValue(v) {
    return String(v || "")
      .replace(/\\n/g, " ")
      .replace(/\r/g, " ")
      .replace(/🇹🇿|🏆|⚽/g, " ")
      .replace(/NATIONAL\s+TEAM/ig, " ")
      .replace(/(?:CLUB\s*\/\s*TEAM|CLUB)/ig, " ")
      .replace(/^TEAM/ig, " ")
      .replace(/\bCOMMENT\b/ig, " ")
      .replace(/^[\s:._-]+/g, " ").replace(/[._]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function commentRows(description) {
    let raw = String(description || "")
      .replace(/\\n/g, "\n")
      .replace(/\r/g, "\n")
      .replace(/\bCOMMENT\b/ig, "")
      .trim();

    let flat = raw.replace(/\n+/g, " ").replace(/\s+/g, " ").trim();

    let national = "";
    let club = "";

    const n = flat.match(/NATIONAL\s+TEAM\s*(?:⚽)?\s*(.*)$/i);

    if (n) {
      let rest = n[1] || "";
      const split = rest.match(/^(.*?)(?:🏆|(?:CLUB\s*\/\s*TEAM|CLUB)|TEAM\s*⚽|TEAM\s+)(.*)$/i);

      if (split) {
        national = cleanValue(split[1]);
        club = cleanValue(split[2]);
      } else {
        national = cleanValue(rest);
      }
    }

    if (!club && /🏆|(?:CLUB\s*\/\s*TEAM|CLUB)/i.test(flat)) {
      const c = flat.match(/(?:🏆\s*)?(?:(?:CLUB\s*\/\s*TEAM|CLUB))\s*(?:⚽)?\s*(.*)$/i);
      if (c) club = cleanValue(c[1]);
    }

    const rows = [];

    if (national && national.length > 1) rows.push({type: "national", label: "NATIONAL TEAM", value: national});
    if (club && club.length > 1) rows.push({type: "club", label: "CLUB / TEAM", value: club});

    return rows;
  }

  function commentsHTML(description) {
    const rows = commentRows(description);
    if (!rows.length) return "";

    return rows.map(row => `
      <div class="comment-line ${safe(row.type)}">
        <span class="comment-label">${safe(row.label)}</span>
        <span class="comment-value">${safe(row.value)}</span>
      </div>
    `).join("");
  }

  function imageHTML(v) {
    if (v.image_url) {
      const src = safe(v.image_url);

      return `
        <div class="result-image-box">
          <img class="result-bg-img" src="${src}" alt="">
          <img class="result-main-img" src="${src}" alt="${safe(v.candidate || v.name)}">
        </div>
      `;
    }

    return `<div class="result-image-box"><span>No Image</span></div>`;
  }

  async function loadResult() {
    updateLoginToLogout();

    const box = document.getElementById("resultBox");
    const voter = getVoter();

    if (!voter || !voter.token) {
      box.innerHTML = `<div class="result-alert">Login kwanza kuona result. <br><a href="/vote/" class="back-btn">Go to Vote</a></div>`;
      return;
    }

    try {
      const data = await api(API + "results/", {
        headers: {"Authorization": "Token " + voter.token}
      });

      if (!data.votes || !data.votes.length) {
        box.innerHTML = `<div class="result-alert">Bado hujapiga kura.</div>`;
        return;
      }

      box.innerHTML = `
        <section class="result-header-card">
          <h2>${safe(data.voter.name)}</h2>
          <p>${safe(data.voter.phone)}</p>
          <p><b>Total votes:</b> ${data.votes.length}</p>
        </section>

        <div class="result-grid">
          ${data.votes.map((v, i) => `
            <div class="result-card">
              ${imageHTML(v)}

              <div class="result-body">
                <span class="result-badge">Vote #${i + 1}</span>
                <h3>${safe(v.candidate)}</h3>
                <div class="result-position">${safe(v.position)}</div>
                ${commentsHTML(v.description)}
                <div class="voted-status">Voted ✓</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    } catch (err) {
      box.innerHTML = `<div class="result-alert">${safe(err.message)}</div>`;
    }
  }

  loadResult();
})();
</script>


<style id="voter-navbar-final-style">
  #voterNavLogout {
    background: linear-gradient(135deg, #dc2626, #991b1b) !important;
    color: #fff !important;
    border-radius: 999px !important;
    padding: 9px 15px !important;
    font-weight: 950 !important;
  }
</style>

<script id="voter-navbar-final-script">
(function () {
  function bindVoterLogout() {
    const logout = document.getElementById("voterNavLogout");
    if (!logout) return;

    logout.onclick = function (e) {
      e.preventDefault();

      if (!confirm("Logout voter?")) return;

      localStorage.removeItem("voterProfile");
      localStorage.removeItem("votedCandidates");

      window.location.href = "/login/?next=/vote/";
    };
  }

  document.addEventListener("DOMContentLoaded", bindVoterLogout);
  setTimeout(bindVoterLogout, 800);
})();
</script>

{% endblock %}
