{% extends "jagwa/base.html" %}
{% load static %}

{% block nav %}
<a href="/">Home</a>
<a href="/vote/">Vote</a>
<a href="/my-vote/">MyVote</a>
<a href="#" id="voterNavLogout">Logout</a>
{% endblock %}

{% block content %}
<style>
  .vote-page-wrap {
    max-width: 1180px;
    margin: 32px auto;
    padding: 0 18px 90px;
  }

  .vote-alert {
    max-width: 900px;
    margin: 0 auto 18px;
    border-radius: 16px;
    padding: 13px 16px;
    background: rgba(239,35,60,0.12);
    border: 1px solid rgba(239,35,60,0.25);
    color: white;
    font-weight: 800;
  }

  .category-bar {
    max-width: 900px;
    margin: 0 auto 22px;
    background: rgba(10, 15, 25, 0.94);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 18px;
    color: white;
    text-align: center;
  }

  .category-title h3 {
    margin: 0;
    font-size: 25px;
    font-weight: 950;
  }

  .category-title p {
    margin: 6px 0 0;
    color: #b9c1d1;
    font-weight: 700;
  }

  .nominee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 460px));
    justify-content: center;
    gap: 30px;
  }

  .nominee-card {
    width: 100%;
    max-width: 460px;
    background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035));
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 28px;
    overflow: hidden;
    color: white;
    box-shadow: 0 16px 35px rgba(0,0,0,0.22);
  }

  .nominee-image-box {
    position: relative;
    width: 100%;
    height: 330px;
    overflow: hidden;
    background: #04070d;
  }

  .nominee-bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(18px) brightness(.55) saturate(1.25);
    transform: scale(1.15);
  }

  .nominee-main-img {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
  }

  .nominee-body {
    padding: 22px;
  }

  .nominee-body h3 {
    margin: 0 0 10px;
    font-size: 25px;
    font-weight: 950;
    letter-spacing: .5px;
  }

  .nominee-position {
    color: #d1d5db;
    margin-bottom: 16px;
    font-size: 18px;
    font-weight: 850;
  }

  .comment-line {
    border-radius: 16px;
    padding: 13px 15px;
    margin: 11px 0;
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    line-height: 1.45;
  }

  .comment-line.national {
    background: linear-gradient(135deg, rgba(239,35,60,.22), rgba(255,255,255,.07));
  }

  .comment-line.club {
    background: linear-gradient(135deg, rgba(22,163,74,.22), rgba(255,255,255,.07));
  }

  .comment-label {
    display: block;
    color: #ff4057;
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .comment-value {
    display: block;
    color: #fff;
    font-size: 18px;
    font-weight: 950;
  }

  .vote-btn {
    margin-top: 16px;
    width: 100%;
    border: 0;
    border-radius: 18px;
    padding: 16px;
    background: linear-gradient(135deg, #ef233c, #ff7a18);
    color: white;
    font-size: 17px;
    font-weight: 950;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(239,35,60,.25);
    transition: .2s ease;
  }

  .vote-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.08);
  }

  .vote-btn.voted {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
    box-shadow: 0 12px 24px rgba(22,163,74,.25);
  }

  .bottom-category-actions {
    max-width: 900px;
    margin: 32px auto 0;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    background: rgba(10, 15, 25, 0.88);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 16px;
  }

  .cat-btn {
    border: 0;
    padding: 13px 18px;
    border-radius: 15px;
    font-weight: 950;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    min-width: 120px;
    text-align: center;
  }

  .cat-btn.prev {
    background: #ffffff;
    color: #111827;
  }

  .cat-btn.next {
    background: linear-gradient(135deg, #ef233c, #ff7a18);
    color: white;
  }

  .cat-btn.result {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
  }

  .cat-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .login-box {
    max-width: 520px;
    margin: 28px auto;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 24px;
    padding: 22px;
    color: white;
  }

  .login-box input {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.18);
    margin: 8px 0 14px;
  }

  .login-box button {
    width: 100%;
    border: 0;
    padding: 13px;
    border-radius: 14px;
    background: linear-gradient(135deg, #ef233c, #ff7a18);
    color: white;
    font-weight: 950;
  }

  @media (max-width: 650px) {
    .vote-page-wrap {
      margin-top: 18px;
      padding: 0 12px 90px;
    }

    .nominee-grid {
      grid-template-columns: 1fr;
      gap: 26px;
    }

    .nominee-card {
      max-width: 100%;
      border-radius: 26px;
    }

    .nominee-image-box {
      height: 310px;
    }

    .bottom-category-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .bottom-category-actions .result {
      grid-column: 1 / -1;
    }

    .cat-btn {
      width: 100%;
      min-width: 0;
    }
  }
</style>

<div class="vote-page-wrap">
  <section id="loginBox" class="login-box" style="display:none;">
    <h3>Voter Login</h3>
    <p>Andika jina na phone number kabla ya kupiga kura.</p>

    <form id="inlineLoginForm">
      <label>Name</label>
      <input id="loginName" placeholder="Enter your name" required>

      <label>Phone Number</label>
      <input id="loginPhone" placeholder="+2557XXXXXXXX" required>

      <button>Continue</button>
    </form>
  </section>

  <div id="voteAlert" class="vote-alert">Loading...</div>
  <div id="categoryBox"></div>
  <div id="nomineesBox"></div>
</div>

<script>
(function () {
  const API = "/api/";
  let positions = [];
  let current = Number(localStorage.getItem("currentCategoryIndex") || "0");

  function safe(x) {
    return String(x || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getVoter() {
    try { return JSON.parse(localStorage.getItem("voterProfile") || "null"); }
    catch { return null; }
  }

  function setVoter(v) {
    localStorage.setItem("voterProfile", JSON.stringify(v));
  }

  function updateLoginToLogout() {
    const voter = getVoter();

    document.querySelectorAll("a").forEach(a => {
      const t = (a.textContent || "").trim().toLowerCase();

      if (t === "login") {
        if (voter && voter.token) {
          a.textContent = "Logout";
          a.href = "#";
          a.onclick = function (e) {
            e.preventDefault();
            localStorage.removeItem("voterProfile");
            localStorage.removeItem("votedCandidates");
            window.location.href = "/login/";
          };
        }
      }
    });
  }

  function getVotedSet() {
    try { return new Set(JSON.parse(localStorage.getItem("votedCandidates") || "[]")); }
    catch { return new Set(); }
  }

  function markVoted(candidateId) {
    const set = getVotedSet();
    set.add(String(candidateId));
    localStorage.setItem("votedCandidates", JSON.stringify(Array.from(set)));
  }

  async function api(url, options) {
    const res = await fetch(url, options || {});
    const text = await res.text();
    let data = null;

    try { data = text ? JSON.parse(text) : null; } catch { data = text; }

    if (!res.ok) {
      throw new Error((data && (data.detail || data.message)) || text || "Request failed");
    }

    return data;
  }

  function cleanValue(v) {
    return String(v || "")
      .replace(/\\n/g, " ")
      .replace(/\r/g, " ")
      .replace(/🇹🇿|🏆|⚽/g, " ")
      .replace(/NATIONAL\s+TEAM/ig, " ")
      .replace(/(?:CLUB\s*\/\s*TEAM|CLUB)/ig, " ")
      .replace(/^TEAM/ig, " ")
      .replace(/\bCOMMENT\b/ig, " ")
      .replace(/^[\s:._-]+/g, " ").replace(/[._]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function commentRows(description) {
    let raw = String(description || "")
      .replace(/\\n/g, "\n")
      .replace(/\r/g, "\n")
      .replace(/\bCOMMENT\b/ig, "")
      .trim();

    let flat = raw.replace(/\n+/g, " ").replace(/\s+/g, " ").trim();

    let national = "";
    let club = "";

    const n = flat.match(/NATIONAL\s+TEAM\s*(?:⚽)?\s*(.*)$/i);
    if (n) {
      let rest = n[1] || "";
      const split = rest.match(/^(.*?)(?:🏆|(?:CLUB\s*\/\s*TEAM|CLUB)|TEAM\s*⚽|TEAM\s+)(.*)$/i);

      if (split) {
        national = cleanValue(split[1]);
        club = cleanValue(split[2]);
      } else {
        national = cleanValue(rest);
      }
    }

    if (!club && /🏆|(?:CLUB\s*\/\s*TEAM|CLUB)/i.test(flat)) {
      const c = flat.match(/(?:🏆\s*)?(?:(?:CLUB\s*\/\s*TEAM|CLUB))\s*(?:⚽)?\s*(.*)$/i);
      if (c) club = cleanValue(c[1]);
    }

    const rows = [];

    if (national && national.length > 1) rows.push({type: "national", label: "NATIONAL TEAM", value: national});
    if (club && club.length > 1) rows.push({type: "club", label: "CLUB / TEAM", value: club});

    return rows;
  }

  function commentsHTML(description) {
    const rows = commentRows(description);
    if (!rows.length) return "";

    return rows.map(row => `
      <div class="comment-line ${safe(row.type)}">
        <span class="comment-label">${safe(row.label)}</span>
        <span class="comment-value">${safe(row.value)}</span>
      </div>
    `).join("");
  }

  function imageHTML(c) {
    if (c.image_url) {
      const src = safe(c.image_url);

      return `
        <div class="nominee-image-box">
          <img class="nominee-bg-img" src="${src}" alt="">
          <img class="nominee-main-img" src="${src}" alt="${safe(c.name)}">
        </div>
      `;
    }

    return `<div class="nominee-image-box"><span>No Image</span></div>`;
  }

  async function login(name, phone) {
    const data = await api(API + "login/", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name, phone})
    });

    setVoter({
      name: data.name || data.full_name || data.voter_name || name,
      phone: data.phone || data.phone_number || data.voter_phone || phone,
      token: data.token || data.access || data.key
    });

    document.getElementById("loginBox").style.display = "none";
    updateLoginToLogout();
    await loadVotePage();
  }

  document.getElementById("inlineLoginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    try {
      await login(
        document.getElementById("loginName").value.trim(),
        document.getElementById("loginPhone").value.trim()
      );
    } catch (err) {
      alert(err.message);
    }
  });

  async function loadVotePage() {
    updateLoginToLogout();

    const voter = getVoter();
    const loginBox = document.getElementById("loginBox");
    const alertBox = document.getElementById("voteAlert");

    if (!voter || !voter.token) {
      loginBox.style.display = "block";
      alertBox.textContent = "Tafadhali login kwanza kwa jina na phone number.";
      document.getElementById("categoryBox").innerHTML = "";
      document.getElementById("nomineesBox").innerHTML = "";
      return;
    }

    loginBox.style.display = "none";

    const voterName = voter.name || voter.full_name || "User";
    const voterPhone = voter.phone || voter.phone_number || "";
    alertBox.textContent = `Logged in as ${voterName}${voterPhone ? " | " + voterPhone : ""}`;

    positions = await api(API + "positions/");

    if (!positions.length) {
      document.getElementById("categoryBox").innerHTML = `<div class="vote-alert">No categories found.</div>`;
      return;
    }

    if (current < 0) current = 0;
    if (current >= positions.length) current = positions.length - 1;

    localStorage.setItem("currentCategoryIndex", String(current));
    const pos = positions[current];

    document.getElementById("categoryBox").innerHTML = `
      <div class="category-bar">
        <div class="category-title">
          <h3>${safe(pos.name)}</h3>
          <p>Category ${current + 1} of ${positions.length}</p>
        </div>
      </div>
    `;

    const candidates = await api(API + "positions/" + pos.id + "/candidates/");
    const box = document.getElementById("nomineesBox");
    const votedSet = getVotedSet();

    if (!candidates.length) {
      box.innerHTML = `<div class="vote-alert">No nominees in this category.</div>`;
      return;
    }

    box.innerHTML = `
      <div class="nominee-grid">
        ${candidates.map(c => {
          const voted = votedSet.has(String(c.id));

          return `
            <div class="nominee-card">
              ${imageHTML(c)}
              <div class="nominee-body">
                <h3>${safe(c.name)}</h3>
                <div class="nominee-position">${safe(c.position_name || pos.name)}</div>
                ${commentsHTML(c.description)}
                <button class="vote-btn ${voted ? "voted" : ""}" data-id="${c.id}" data-name="${safe(c.name)}">
                  ${voted ? "Voted ✓" : "Vote"}
                </button>
              </div>
            </div>
          `;
        }).join("")}
      </div>

      <div class="bottom-category-actions">
        <button id="prevBtn" class="cat-btn prev" ${current === 0 ? "disabled" : ""}>Previous</button>
        <button id="nextBtn" class="cat-btn next" ${current === positions.length - 1 ? "disabled" : ""}>Next</button>
        <a href="/my-vote/" class="cat-btn result">Result</a>
      </div>
    `;

    document.getElementById("prevBtn").onclick = function () {
      current--;
      loadVotePage();
      window.scrollTo({top: 0, behavior: "smooth"});
    };

    document.getElementById("nextBtn").onclick = function () {
      current++;
      loadVotePage();
      window.scrollTo({top: 0, behavior: "smooth"});
    };

    document.querySelectorAll(".vote-btn").forEach(btn => {
      btn.onclick = async function () {
        if (!confirm("Submit vote for " + btn.dataset.name + "?")) return;

        try {
          await api(API + "vote/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
              token: getVoter().token,
              candidate_id: btn.dataset.id
            })
          });

          markVoted(btn.dataset.id);
          btn.classList.add("voted");
          btn.textContent = "Voted ✓";

          alert("Vote recorded. Unaweza kupiga kura nyingine au kwenda Next.");
        } catch (err) {
          alert("Vote failed: " + err.message);
        }
      };
    });
  }

  loadVotePage();
})();
</script>
<script src="/static/vote_finish_tools.js?v=finish1"></script>


<style id="voter-navbar-final-style">
  #voterNavLogout {
    background: linear-gradient(135deg, #dc2626, #991b1b) !important;
    color: #fff !important;
    border-radius: 999px !important;
    padding: 9px 15px !important;
    font-weight: 950 !important;
  }
</style>

<script id="voter-navbar-final-script">
(function () {
  function bindVoterLogout() {
    const logout = document.getElementById("voterNavLogout");
    if (!logout) return;

    logout.onclick = function (e) {
      e.preventDefault();

      if (!confirm("Logout voter?")) return;

      localStorage.removeItem("voterProfile");
      localStorage.removeItem("votedCandidates");

      window.location.href = "/login/?next=/vote/";
    };
  }

  document.addEventListener("DOMContentLoaded", bindVoterLogout);
  setTimeout(bindVoterLogout, 800);
})();
</script>

{% endblock %}
