{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAGWA SPORTS | My Votes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'style.css' %}">
    <script src="{% static 'app.js' %}" defer></script>
</head>
<body>

<div class="voter-layout">

    <aside class="voter-sidebar">
        <div class="brand-box">
            <img src="{% static 'logo.png' %}" alt="JAGWA SPORTS" class="brand-logo">
            <h3>JAGWA<span>SPORTS</span></h3>
        </div>

        <nav class="voter-menu">
            <a href="/">🏠 Dashboard</a>
            <a href="/vote/">🗳️ Vote</a>
            <a href="/results/" class="active">✅ My Votes</a>
            <a href="/login/">👤 My Profile</a>
            <a href="/login/">🚪 Logout</a>
        </nav>

        <div class="vote-note">
            <strong>Your Selected Votes</strong>
            <p>This page shows only the candidates you selected.</p>
        </div>
    </aside>

    <main class="voter-main">

        <div class="voter-topbar">
            <div>
                <h1>My Votes</h1>
                <p>Here are the candidates you selected.</p>
            </div>

            <div id="authStatus"></div>
        </div>

        <p id="lastUpdated" class="text-muted"></p>

        <section id="results"></section>

    </main>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        window.pageInit('results');
    });
</script>

</body>
</html>
